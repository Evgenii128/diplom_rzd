<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подать заявление - РЖД-ТехСервис</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      .header {
        background: linear-gradient(135deg, #2c3e50, #3498db);
        color: white;
        padding: 25px;
        border-radius: 15px;
        margin-bottom: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .header h1 {
        margin: 0;
        font-size: 2rem;
      }

      .header a {
        color: white;
        text-decoration: none;
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        transition: all 0.3s;
      }

      .header a:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }

      .form-card {
        background: white;
        padding: 35px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .section-title {
        margin: 0 0 25px 0;
        color: #2c3e50;
        font-size: 1.8rem;
        font-weight: 600;
        border-bottom: 3px solid #3498db;
        padding-bottom: 10px;
      }

      .services-container {
        background: #f8fafc;
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 25px;
        border: 2px solid #e2e8f0;
      }

      .service-item {
        display: flex;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid #e2e8f0;
        transition: all 0.3s;
        background: white;
        margin-bottom: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }

      .service-item:hover {
        background: #ebf8ff;
        transform: translateX(5px);
        box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
      }

      .service-checkbox {
        margin-right: 20px;
        transform: scale(1.3);
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #3498db;
      }

      .service-info {
        flex: 1;
      }

      .service-name {
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 5px;
        font-size: 1.1rem;
      }

      .service-description {
        font-size: 0.9rem;
        color: #718096;
      }

      .service-price {
        font-weight: 800;
        color: #27ae60;
        font-size: 1.4rem;
        margin: 0 20px;
        min-width: 120px;
        text-align: right;
      }

      .service-quantity {
        width: 100px;
      }

      .service-quantity input {
        width: 100%;
        padding: 10px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        text-align: center;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s;
      }

      .service-quantity input:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
      }

      .total-price {
        background: linear-gradient(135deg, #2c3e50, #3498db);
        color: white;
        padding: 25px;
        border-radius: 15px;
        margin: 25px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 2rem;
        font-weight: 800;
        box-shadow: 0 10px 30px rgba(52, 152, 219, 0.4);
      }

      .total-price-label {
        font-size: 1.4rem;
        opacity: 0.9;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #2c3e50;
        font-size: 0.95rem;
      }

      .form-group label i {
        margin-right: 8px;
        color: #3498db;
      }

      .form-group input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-family: "Inter", sans-serif;
        font-size: 1rem;
        transition: all 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
      }

      .checkbox-group {
        margin: 25px 0;
        padding: 15px;
        background: #f8fafc;
        border-radius: 10px;
      }

      .checkbox-group label {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        font-size: 1rem;
        color: #2c3e50;
      }

      .checkbox-group input {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #3498db;
      }

      .submit-btn {
        width: 100%;
        padding: 18px;
        background: linear-gradient(135deg, #27ae60, #2ecc71);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.3rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
      }

      .submit-btn:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(39, 174, 96, 0.4);
      }

      .submit-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .loading-services {
        text-align: center;
        padding: 50px;
        color: #718096;
      }

      .loading-services i {
        font-size: 3rem;
        margin-bottom: 15px;
        animation: spin 1s linear infinite;
        color: #3498db;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .empty-state {
        text-align: center;
        padding: 50px;
        color: #718096;
      }

      .empty-state i {
        font-size: 4rem;
        margin-bottom: 15px;
        opacity: 0.5;
      }

      .success-message {
        text-align: center;
        padding: 40px;
        animation: fadeIn 0.5s ease;
      }

      .success-message i {
        font-size: 5rem;
        color: #27ae60;
        margin-bottom: 20px;
      }

      .success-message h2 {
        color: #2c3e50;
        margin-bottom: 20px;
        font-size: 2rem;
      }

      .request-number {
        font-size: 1.5rem;
        font-weight: bold;
        color: #3498db;
        margin: 20px 0;
        padding: 15px;
        background: #ebf8ff;
        border-radius: 10px;
        display: inline-block;
      }

      .total-amount {
        font-size: 1.8rem;
        color: #27ae60;
        margin: 20px 0;
        font-weight: 800;
      }

      .selected-services-summary {
        background: #f8fafc;
        padding: 25px;
        border-radius: 15px;
        margin: 25px 0;
        text-align: left;
      }

      .selected-service-item {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #e2e8f0;
        font-size: 1.1rem;
      }

      .selected-service-item:last-child {
        border-bottom: none;
      }

      .selected-service-item span:last-child {
        font-weight: 700;
        color: #27ae60;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .back-link {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 30px;
        background: #3498db;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.3s;
      }

      .back-link:hover {
        background: #2980b9;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
      }

      .error-message {
        color: #e74c3c;
        background: #fde8e8;
        padding: 15px;
        border-radius: 10px;
        margin: 20px 0;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid #f5c6cb;
      }

      .error-message i {
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div>
          <h1>🚂 РЖД-ТехСервис</h1>
          <p style="margin: 5px 0 0; opacity: 0.9">
            Выбор услуг и подача заявления
          </p>
        </div>
        <a href="/"><i class="fas fa-home"></i> На главную</a>
      </div>

      <div class="form-card" id="requestFormContainer">
        <h2 class="section-title">
          <i class="fas fa-tools"></i> Выберите необходимые услуги
        </h2>

        <div class="services-container" id="servicesList">
          <div class="loading-services">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Загрузка доступных услуг...</p>
          </div>
        </div>

        <div id="totalPriceContainer" class="total-price" style="display: none">
          <span class="total-price-label"
            ><i class="fas fa-calculator"></i> Общая стоимость:</span
          >
          <span id="totalPriceValue">0 ₽</span>
        </div>

        <h2 class="section-title" style="margin-top: 30px">
          <i class="fas fa-address-card"></i> Контактная информация
        </h2>

        <form id="publicRequestForm">
          <div class="form-grid">
            <div class="form-group">
              <label><i class="fas fa-user"></i> Ваше ФИО *</label>
              <input
                type="text"
                id="full_name"
                required
                placeholder="Иванов Иван Иванович"
                value="Иванов Иван Иванович"
              />
            </div>

            <div class="form-group">
              <label><i class="fas fa-building"></i> Название компании</label>
              <input
                type="text"
                id="company_name"
                placeholder="ООО 'Ваша компания'"
                value="ООО 'Ваша компания'"
              />
            </div>

            <div class="form-group">
              <label><i class="fas fa-phone"></i> Телефон *</label>
              <input
                type="tel"
                id="phone"
                required
                placeholder="+7 (999) 123-45-67"
                value="+7 (999) 123-45-67"
              />
            </div>

            <div class="form-group">
              <label><i class="fas fa-envelope"></i> Email *</label>
              <input
                type="email"
                id="email"
                required
                placeholder="your@email.com"
                value="your@email.com"
              />
            </div>

            <div class="form-group">
              <label><i class="fas fa-calendar-alt"></i> Желаемая дата</label>
              <input type="date" id="preferred_date" />
            </div>
          </div>

          <input
            type="hidden"
            id="selectedServicesData"
            name="selected_services"
          />
          <input type="hidden" id="totalAmount" name="total_amount" />

          <div class="checkbox-group">
            <label>
              <input type="checkbox" id="agree" required checked />
              <span>Я согласен на обработку персональных данных *</span>
            </label>
          </div>

          <div id="errorContainer" class="error-message" style="display: none">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <i class="fas fa-paper-plane"></i> Отправить заявление
          </button>
        </form>

        <div id="successMessage" class="success-message" style="display: none">
          <i class="fas fa-check-circle"></i>
          <h2>Спасибо! Ваша заявка принята</h2>
          <div class="request-number" id="successRequestNumber"></div>
          <div class="total-amount" id="successTotalAmount"></div>

          <div
            id="selectedServicesSummary"
            class="selected-services-summary"
          ></div>

          <p style="color: #718096; margin: 25px 0">
            <i class="fas fa-clock"></i> Наш менеджер свяжется с вами в
            ближайшее время
          </p>

          <a href="/" class="back-link">
            <i class="fas fa-home"></i> Вернуться на главную
          </a>
        </div>
      </div>
    </div>

    <script>
      let services = [];
      let selectedServices = new Map();

      document.addEventListener("DOMContentLoaded", async function () {
        await loadServices();

        const date = new Date();
        date.setDate(date.getDate() + 3);
        const today = date.toISOString().split("T")[0];
        document.getElementById("preferred_date").value = today;
      });

      async function loadServices() {
        try {
          console.log("Загрузка услуг...");
          const response = await fetch("/api/services?active=true");
          if (!response.ok) {
            throw new Error(`HTTP ошибка! статус: ${response.status}`);
          }
          services = await response.json();
          console.log("Загружены услуги:", services);

          const servicesList = document.getElementById("servicesList");

          if (services.length === 0) {
            servicesList.innerHTML =
              '<div class="empty-state"><i class="fas fa-concierge-bell"></i><p>Услуги временно недоступны</p></div>';
            return;
          }

          let html = "";

          services.forEach((service) => {
            html += `
                        <div class="service-item" id="service-${service.id}">
                            <input type="checkbox" class="service-checkbox" 
                                   id="check-${service.id}" 
                                   value="${service.id}"
                                   data-price="${service.base_price}"
                                   data-name="${service.service_name}"
                                   onchange="toggleService(${service.id})">
                            <div class="service-info">
                                <div class="service-name">${service.service_name}</div>
                                <div class="service-description">${service.description || "Нет описания"} (${service.unit})</div>
                            </div>
                            <div class="service-price">${formatCurrency(service.base_price)}</div>
                            <div class="service-quantity" style="display: none;" id="quantity-${service.id}">
                                <input type="number" 
                                       min="0.1" 
                                       step="0.1" 
                                       value="1" 
                                       onchange="updateServiceQuantity(${service.id}, this.value)"
                                       onclick="event.stopPropagation()">
                            </div>
                        </div>
                    `;
          });

          servicesList.innerHTML = html;
        } catch (error) {
          console.error("Ошибка загрузки услуг:", error);
          document.getElementById("servicesList").innerHTML = `
                    <div class="empty-state" style="color: #e74c3c;">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Ошибка загрузки услуг: ${error.message}</p>
                        <button onclick="loadServices()" class="back-link" style="margin-top: 15px;">
                            <i class="fas fa-sync-alt"></i> Повторить
                        </button>
                    </div>
                `;
        }
      }

      function toggleService(serviceId) {
        const checkbox = document.getElementById(`check-${serviceId}`);
        const quantityDiv = document.getElementById(`quantity-${serviceId}`);

        if (checkbox.checked) {
          quantityDiv.style.display = "block";
          const service = services.find((s) => s.id === serviceId);
          if (service) {
            selectedServices.set(serviceId, {
              service_id: serviceId,
              service_name: service.service_name,
              quantity: 1,
              price: service.base_price,
              subtotal: service.base_price,
            });
          }
        } else {
          quantityDiv.style.display = "none";
          selectedServices.delete(serviceId);
        }

        updateTotalPrice();
      }

      function updateServiceQuantity(serviceId, quantity) {
        const numQuantity = parseFloat(quantity);
        if (numQuantity && numQuantity > 0) {
          const service = services.find((s) => s.id === serviceId);
          if (service) {
            selectedServices.set(serviceId, {
              service_id: serviceId,
              service_name: service.service_name,
              quantity: numQuantity,
              price: service.base_price,
              subtotal: service.base_price * numQuantity,
            });
          }
        } else {
          selectedServices.delete(serviceId);
        }

        updateTotalPrice();
      }

      function updateTotalPrice() {
        const totalPriceContainer = document.getElementById(
          "totalPriceContainer",
        );
        const totalPriceValue = document.getElementById("totalPriceValue");
        const selectedServicesData = document.getElementById(
          "selectedServicesData",
        );
        const totalAmount = document.getElementById("totalAmount");

        let total = 0;
        const selectedArray = [];

        selectedServices.forEach((item) => {
          const subtotal = Number(item.subtotal) || 0;
          total += subtotal;

          selectedArray.push({
            service_id: item.service_id,
            service_name: item.service_name,
            quantity: Number(item.quantity) || 1,
            price: Number(item.price) || 0,
            subtotal: subtotal,
          });
        });

        console.log("Выбрано услуг:", selectedArray.length, "на сумму:", total);

        if (selectedArray.length > 0) {
          totalPriceContainer.style.display = "flex";
          totalPriceValue.textContent = formatCurrency(total);
          selectedServicesData.value = JSON.stringify(selectedArray);
          totalAmount.value = total;
        } else {
          totalPriceContainer.style.display = "none";
          selectedServicesData.value = "";
          totalAmount.value = 0;
        }
      }

      document
        .getElementById("publicRequestForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          document.getElementById("errorContainer").style.display = "none";

          if (selectedServices.size === 0) {
            showError("Пожалуйста, выберите хотя бы одну услугу");
            return;
          }

          if (!document.getElementById("agree").checked) {
            showError("Необходимо согласие на обработку персональных данных");
            return;
          }

          const submitBtn = document.getElementById("submitBtn");
          const originalText = submitBtn.innerHTML;
          submitBtn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Отправка...';
          submitBtn.disabled = true;

          const selectedServicesArray = [];
          selectedServices.forEach((item) => {
            selectedServicesArray.push(item);
          });

          const formData = {
            full_name: document.getElementById("full_name").value,
            company_name: document.getElementById("company_name").value || null,
            phone: document.getElementById("phone").value,
            email: document.getElementById("email").value,
            preferred_date:
              document.getElementById("preferred_date").value || null,
            selected_services: selectedServicesArray,
            total_amount:
              parseFloat(document.getElementById("totalAmount").value) || 0,
          };

          console.log("Отправка данных:", JSON.stringify(formData, null, 2));

          try {
            const response = await fetch("/api/public/requests", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Accept: "application/json",
              },
              body: JSON.stringify(formData),
            });

            const result = await response.json();
            console.log("Ответ сервера:", result);

            if (response.ok && result.success) {
              document
                .getElementById("requestFormContainer")
                .querySelector("form").style.display = "none";
              document.getElementById("totalPriceContainer").style.display =
                "none";
              document.getElementById("servicesList").style.display = "none";

              document.getElementById("successRequestNumber").innerHTML = `
                        <i class="fas fa-hashtag"></i> Номер заявки: <strong>${result.request_number}</strong>
                    `;
              document.getElementById("successTotalAmount").innerHTML = `
                        Общая сумма: <strong>${formatCurrency(formData.total_amount)}</strong>
                    `;

              let summaryHtml =
                '<h4 style="margin: 0 0 15px 0; color: #2c3e50;">Выбранные услуги:</h4>';
              selectedServicesArray.forEach((item) => {
                summaryHtml += `
                            <div class="selected-service-item">
                                <span><i class="fas fa-check-circle" style="color: #27ae60; margin-right: 8px;"></i>${item.service_name} x${item.quantity}</span>
                                <span>${formatCurrency(item.subtotal)}</span>
                            </div>
                        `;
              });
              document.getElementById("selectedServicesSummary").innerHTML =
                summaryHtml;

              document.getElementById("successMessage").style.display = "block";
            } else {
              throw new Error(result.error || "Неизвестная ошибка");
            }
          } catch (error) {
            console.error("Ошибка:", error);
            showError("Ошибка: " + error.message);
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
          }
        });

      function showError(message) {
        document.getElementById("errorText").textContent = message;
        document.getElementById("errorContainer").style.display = "flex";
      }

      function formatCurrency(amount) {
        return new Intl.NumberFormat("ru-RU", {
          style: "currency",
          currency: "RUB",
          minimumFractionDigits: 0,
          maximumFractionDigits: 2,
        }).format(amount);
      }
    </script>

  </body>
</html>
